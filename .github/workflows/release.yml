name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release. Leave blank to build only."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build (x64 Release)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (CMake preset x64-release)
        run: cmake --preset x64-release

      - name: Build
        run: cmake --build --preset x64-release

      - name: Stage artifact
        shell: pwsh
        run: |
          $exe = "out/build/x64-release/pulsemdl.exe"
          if (-not (Test-Path $exe)) { throw "pulsemdl.exe was not produced" }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $exe dist/
          Copy-Item README.md dist/ -ErrorAction SilentlyContinue

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/*") {
            # Triggered by a pushed tag - use it as-is.
            $tag = $ref -replace "refs/tags/", ""
          } elseif ("${{ github.event.inputs.tag }}") {
            # Explicit tag supplied to the manual run.
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            # Fall back to the current source version (PULSE_MDL_VERSION).
            $src = Get-Content studiomdl/studiomdl_app.cpp -Raw
            $m = [regex]::Match($src, 'PULSE_MDL_VERSION\s*=\s*"([^"]+)"')
            if (-not $m.Success) { throw "Could not find PULSE_MDL_VERSION in studiomdl/studiomdl_app.cpp" }
            $version = $m.Groups[1].Value
            $tag = "v$version"
          }
          # Release title is "PulseMDL v<version>".
          $title = "PulseMDL $tag"
          "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "title=$title" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $title (tag: $tag)"

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          Compress-Archive -Path dist/* -DestinationPath "pulsemdl-$tag-win64.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsemdl-${{ steps.ver.outputs.tag }}-win64
          path: pulsemdl-${{ steps.ver.outputs.tag }}-win64.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.title }}
          generate_release_notes: true
          files: |
            pulsemdl-${{ steps.ver.outputs.tag }}-win64.zip
