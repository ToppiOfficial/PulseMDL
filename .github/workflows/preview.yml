name: Dev Release

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (x64 Release)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (CMake preset x64-release)
        run: cmake --preset x64-release

      - name: Build
        run: cmake --build --preset x64-release

      - name: Stage artifact
        shell: pwsh
        run: |
          $exe = "out/build/x64-release/pulsemdl.exe"
          if (-not (Test-Path $exe)) { throw "pulsemdl.exe was not produced" }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $exe dist/
          Copy-Item README.md dist/ -ErrorAction SilentlyContinue

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath "pulsemdl-dev-win64.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsemdl-dev-win64
          path: pulsemdl-dev-win64.zip
          if-no-files-found: error

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release delete "dev" --yes --cleanup-tag 2>/dev/null || true

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          NOTES=$(printf '> [!WARNING]\n> This is an automated dev build. It may be unstable, contain hidden bugs, or introduce breaking changes. Use at your own risk.\n\n**Commit:** %s\n\n%s' "${COMMIT_URL}" "${COMMIT_MSG}")
          gh release create "dev" \
            "pulsemdl-dev-win64.zip" \
            --title "dev" \
            --notes "${NOTES}" \
            --prerelease
